<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Generator - CSCI 3172 Lab</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Anton|Roboto:400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">
  <header class="p-4 bg-gray-800 text-center">
    <h1 class="text-3xl font-bold" style="font-family: 'Anton', sans-serif;">Meme Generator</h1>
    <p class="text-gray-300">CSCI 3172 Lab &bull; Accessible & Responsive</p>
  </header>
  <main class="flex-1 flex flex-col items-center p-4">
    <form id="searchForm" class="flex flex-col md:flex-row gap-2 w-full max-w-xl mb-4" aria-label="Image search form">
      <label for="searchInput" class="sr-only">Search Unsplash Images</label>
      <input id="searchInput" name="search" type="text" placeholder="Search Unsplash..." class="flex-1 p-2 rounded text-black" aria-label="Search Unsplash Images" />
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Search</button>
    </form>
    <div class="flex flex-col md:flex-row gap-4 w-full max-w-xl mb-4">
      <div class="flex-1">
        <label for="uploadInput" class="block mb-1 font-semibold">Upload Your Image</label>
        <input id="uploadInput" type="file" accept="image/*" class="w-full" aria-label="Upload your own image" />
      </div>
      <div class="flex-1">
        <label for="unsplashResults" class="block mb-1 font-semibold">Unsplash Results</label>
        <div id="unsplashResults" class="grid grid-cols-3 gap-2" aria-live="polite"></div>
      </div>
    </div>
    <div class="w-full max-w-xl mb-4">
      <label for="topText" class="block font-semibold">Top Text</label>
      <input id="topText" type="text" class="w-full p-2 mb-2 rounded text-black" placeholder="Enter top text" aria-label="Top meme text" />
      <label for="bottomText" class="block font-semibold">Bottom Text</label>
      <input id="bottomText" type="text" class="w-full p-2 rounded text-black" placeholder="Enter bottom text" aria-label="Bottom meme text" />
    </div>
    <div class="w-full max-w-xl flex flex-col items-center">
      <canvas id="memeCanvas" width="500" height="500" class="border-2 border-gray-700 rounded mb-2" aria-label="Meme preview canvas"></canvas>
      <button id="downloadBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded" aria-label="Download meme image">Download Meme</button>
    </div>
  </main>
  <footer class="p-4 bg-gray-800 text-center text-gray-400 text-sm">
    &copy; 2026 CSCI 3172 Lab. Accessible Meme Generator.
  </footer>
  <script src="script.js"></script>
</body>
</html>
