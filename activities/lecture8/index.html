<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>Fantastic Beasts Sanctuary</title>
	 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div class="container">
		<h1 class="text-center mb-4">Fantastic Beasts Sanctuary</h1>

		<div class="mb-4">
			<input type="text" id="searchBar" placeholder="Search by name or type..." class="form-control">
		</div>

		<form id="addCreatureForm">
			<div class="form-row">
				<div class="form-group col-md-6">
					<label for="creatureName">Creature Name:</label>
					<input type="text" id="creatureName" required class="form-control">
				</div>
				<div class="form-group col-md-6">
					<label for="creatureType">Creature Type:</label>
					<input type="text" id="creatureType" required class="form-control">
				</div>
			</div>
			<div class="form-group">
				<label for="creatureUrl">Image URL (Optional):</label>
				<input type="text" id="creatureUrl" class="form-control" placeholder="https://example.com/image.jpg">
			</div>
			<div class="form-group">
				<label for="creatureNotes">Notes/Observations:</label>
				<textarea id="creatureNotes" class="form-control" rows="2"></textarea>
			</div>
			<button type="submit" class="btn btn-primary btn-block">Add to Sanctuary</button>
		</form>

		<hr>
		<div id="creatureSanctuary" class="row"></div>
	</div>

    <script src="js/script.js"></script>
</body>
</html>
